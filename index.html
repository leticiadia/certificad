<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,400;0,700;1,100;1,400;1,700&display=swap"
        rel="stylesheet">
    <title>Certificard</title>
</head>
<body>
    <main>
        <section class="card-glass">
            <div class="profile-card">
                <div class="user">
                    <img src="https://unavatar.now.sh/github/leticiadia" alt="Foto do usuário" id="user-image">
                    <h3>Leticia Dias</h3>
                    <p>Frontend Developer</p>
                </div>

                <div class="links">
                    <div class="link">
                        <img src="https://image.flaticon.com/icons/png/512/25/25231.png" alt="Ícone Github" id="icon-github">
                        <a href="https://github.com/leticiadia" target="_blank">Github</a> 
                    </div>

                    <div class="link">
                        <img src="https://img.icons8.com/ios/452/linkedin.png" alt="Ícone Linkedin" id="icon-linkedin">
                        <a href="https://www.linkedin.com/in/leticia-dia/" target="_blank">Linkedin</a> 
                    </div>

                    <div class="link">
                        <img src="https://image.flaticon.com/icons/png/512/87/87390.png" alt="Ícone Instagram" id="icon-instagram">
                        <a href="https://www.instagram.com/startnowleticia/" target="_blank">Instagram</a>
                    </div>

                    <div class="link">
                        <img src="https://img.icons8.com/ios/452/twitter--v1.png" alt="Ícone Twitter" id="icon-twitter">
                        <a href="https://twitter.com/oliverdays19" target="_blank">Twitter</a>
                    </div>
                </div>
            </div>
            
            <div class="projects">
                <div class="status">
                    <h1>Insígnias da imersão.dev</h1>
                </div>
                
                <div class="cards">
                    <div class="card">
                        <div class="card-info">
                          <a href="https://github.com/leticiadia/temp-converter" target="_blank">🌡Conversor de Temperatura</a> 
                          <p>Aula 1</p>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-info">
                          <a href="https://github.com/leticiadia/gameThemed" target="_blank">🔮 Mentalista</a>
                          <p>Aula 3</p>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-info">
                          <a href="https://github.com/leticiadia/adventure" target="_blank">🏆 Tabela de Classificação</a>
                          <p>Aula 6</p>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-info">
                          <a href="https://github.com/leticiadia/trunfo-game" target="_blank">🃏 Supertrunfo</a>
                          <p>Aula 7, 8 e 9</p>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-info">
                          <a href="https://github.com/leticiadia/certificad" target="_blank">🌐 Certificard</a>
                          <p>Aula 10</p>
                        </div>
                    </div>
                </div>
                
            </div>
        </section>
    </main>
</body>
</html>
